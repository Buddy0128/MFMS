version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mfms-mysql
    environment:
      MYSQL_ROOT_PASSWORD: "localhost@123#"
      MYSQL_DATABASE: mfms
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: mfms-backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:mysql://mysql:3306/mfms?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DATABASE_USERNAME: root
      DATABASE_PASSWORD: "localhost@123#"
      JWT_SECRET: mfms-super-secret-key-for-jwt-token-generation-min-256-bits-long-key-here
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: mfms-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mysql_data:
